<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .preview-pane { height: 150px; background: #333; position: relative; border-bottom: 2px solid #f1c40f; overflow: hidden; zoom: 0.5; }
        .main-controls { flex: 1; display: grid; grid-template-columns: 1fr 1fr; padding: 10px; gap: 10px; overflow-y: auto; }
        .card { background: #1e1e1e; padding: 10px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { padding: 12px 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-run { background: #27ae60; color: white; }
        .btn-act { background: #2980b9; color: white; }
        .btn-wkt { background: #c0392b; color: white; }
        input, select { width: 95%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

    <div class="preview-pane">
        <iframe src="index.html" style="width:100%; height:300px; border:none;"></iframe>
    </div>

    <div class="main-controls">
        <div class="card">
            <h4>Squad Setup</h4>
            <input id="teamName" placeholder="Batting Team Name">
            <textarea id="squad" rows="5" style="width:95%; background:#222; color:white;" placeholder="11 Player Names (One per line)"></textarea>
            <textarea id="bowlers" rows="5" style="width:95%; background:#222; color:white;" placeholder="Opponent Bowlers (One per line)"></textarea>
            <button class="btn-act" onclick="initMatch()" style="width:100%">Update Squads</button>
        </div>

        <div class="card">
            <h4>Change Player (Live)</h4>
            <label>Striker:</label>
            <select id="selP1" onchange="changePlayer('p1n', this.value)"></select>
            <label>Non-Striker:</label>
            <select id="selP2" onchange="changePlayer('p2n', this.value)"></select>
            <label>Current Bowler:</label>
            <select id="selBw" onchange="changePlayer('bwn', this.value)"></select>
            <button class="btn-act" style="width:100%; margin-top:10px;" onclick="swapStrike()">Swap Strike</button>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h4>Score Control</h4>
            <div class="grid">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(3)">3</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button class="btn-act" onclick="ball(1, true)">WD/NB</button>
                <button class="btn-wkt" onclick="wicket()">WICKET</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {             
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');

        window.initMatch = async () => {
            const s = document.getElementById('squad').value.split('\n');
            const b = document.getElementById('bowlers').value.split('\n');
            const data = {
                batTeam: document.getElementById('teamName').value,
                runs:0, wkts:0, balls:0, str:1,
                p1n:s[0], p1r:0, p1b:0, p2n:s[1], p2r:0, p2b:0,
                bwn:b[0], bwr:0, bww:0, bwb:0
            };
            await set(mRef, data);
            fillSelects(s, b);
        };

        function fillSelects(s, b) {
            const h = s.map(n => `<option value="${n}">${n}</option>`).join('');
            document.getElementById('selP1').innerHTML = h;
            document.getElementById('selP2').innerHTML = h;
            document.getElementById('selBw').innerHTML = b.map(n => `<option value="${n}">${n}</option>`).join('');
        }

        window.ball = async (r, ex) => {
            const snap = await get(mRef); const d = snap.val();
            d.runs += r; d.bwr += r;
            if(!ex) {
                d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0 || d.balls % 6 === 0) swapLocal(d);
            }
            update(mRef, d);
        };

        window.wicket = async () => {
            const snap = await get(mRef); const d = snap.val();
            d.wkts++; d.balls++; d.bww++;
            update(mRef, d);
        };

        window.changePlayer = (key, val) => update(mRef, { [key]: val });
        window.swapStrike = async () => { const snap = await get(mRef); const d = snap.val(); swapLocal(d); update(mRef, d); };
        function swapLocal(d) { d.str = d.str === 1 ? 2 : 1; }
    </script>
</body>
</html>
