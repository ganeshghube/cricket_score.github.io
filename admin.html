<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cricket Admin Master</title>
    <style>
        :root { --primary: #f1c40f; --bg: #000; --card: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* THE FIX FOR PREVIEW */
        .preview-area {
            width: 100%; height: 140px; background: #333;
            position: sticky; top: 0; z-index: 1000;
            overflow: hidden; border-bottom: 2px solid var(--primary);
        }
        iframe {
            width: 1920px; height: 1080px; border: none;
            transform: scale(0.2); transform-origin: 0 0;
        }

        .content { padding: 15px; display: grid; gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; }
        .grid-scoring { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-run { background: #1b5e20; color: white; }
        .btn-wkt { background: #b71c1c; color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

    <div class="preview-area">
        <iframe src="index.html"></iframe>
    </div>

    <div class="content">
        <div class="card">
            <h4>Live Scoring</h4>
            <div class="grid-scoring">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button style="background:#e65100;color:white" onclick="ball(1,true)">WD</button>
                <button style="background:#e65100;color:white" onclick="ball(1,true)">NB</button>
                <button class="btn-wkt" onclick="wicket()">WKT</button>
            </div>
        </div>

        <div class="card">
            <h4>Team Setup (Only click Initialize for New Match)</h4>
            <input id="teamA" placeholder="Batting Team Name">
            <input id="teamB" placeholder="Bowling Team Name">
            <input type="number" id="matchTarget" placeholder="Target">
            <button style="background:var(--primary); width:100%" onclick="initMatch()">START NEW MATCH</button>
        </div>
        
        <button style="background:#444; color:white; width:100%" onclick="fullReset()">RESET FIREBASE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');

        // CRITICAL: This pulls data on load so values don't disappear
        onValue(mRef, (snapshot) => {
            const d = snapshot.val();
            if(d) {
                document.getElementById('teamA').value = d.batTeam;
                document.getElementById('teamB').value = d.bowlTeam;
                document.getElementById('matchTarget').value = d.target;
            }
        });

        window.ball = async (r, ex) => {
            const snap = await get(mRef); const d = snap.val();
            d.runs += r; d.bwr += r;
            if(!ex) {
                d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0 || d.balls % 6 === 0) d.str = d.str === 1 ? 2 : 1;
            }
            update(mRef, d);
        };

        window.wicket = async () => {
            const snap = await get(mRef); const d = snap.val();
            d.wkts++; d.balls++; d.bww++; update(mRef, d);
        };

        window.initMatch = async () => {
            await set(mRef, {
                batTeam: document.getElementById('teamA').value,
                bowlTeam: document.getElementById('teamB').value,
                runs:0, wkts:0, balls:0, str:1, target: parseInt(document.getElementById('matchTarget').value)||0,
                p1n:"Batsman 1", p1r:0, p1b:0, p2n:"Batsman 2", p2r:0, p2b:0,
                bwn:"Bowler", bwr:0, bww:0, bwb:0
            });
            alert("Match Started!");
        };

        window.fullReset = async () => { if(confirm("Clear All?")) set(mRef, null); };
    </script>
</body>
</html>
