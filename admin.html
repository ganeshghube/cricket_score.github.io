<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Admin Mobile</title>
    <style>
        :root { --primary: #f1c40f; --bg: #000; --card: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        /* MOBILE PREVIEW FIX */
        .preview-container {
            width: 100%;
            height: 120px; /* Short height for mobile */
            background: #222;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This centers and scales the 1080p overlay to fit any mobile width */
        .scaler {
            width: 1920px;
            height: 1080px;
            transform: scale(calc(100vw / 1920)); /* Dynamic scaling based on screen width */
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 1920px;
            height: 1080px;
            border: none;
            background: #111;
        }

        /* CONTENT STYLING */
        .content { padding: 10px; display: grid; gap: 10px; }
        .card { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid #333; }
        h4 { margin: 0 0 8px 0; color: var(--primary); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid-scoring { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        button { padding: 15px 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .btn-run { background: #2e7d32; color: white; }
        .btn-wkt { background: #c62828; color: white; }
        .btn-extra { background: #ef6c00; color: white; }
        .btn-util { background: #1565c0; color: white; width: 100%; margin-top: 5px; }
        
        input, select { width: 100%; padding: 10px; margin: 4px 0; background: #000; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        label { font-size: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="preview-container">
        <div class="scaler">
            <iframe id="previewFrame" src="index.html"></iframe>
        </div>
    </div>

    <div class="content">
        
        <div class="card">
            <h4>Live Score Control</h4>
            <div class="grid-scoring">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button class="btn-extra" onclick="ball(1, true)">WD</button>
                <button class="btn-extra" onclick="ball(1, true)">NB</button>
                <button class="btn-wkt" onclick="wicket()">WKT</button>
            </div>
            <button class="btn-util" style="background:#444;" onclick="undo()">UNDO LAST BALL</button>
        </div>

        <div class="card">
            <h4>Active Players & Target</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Striker</label><input id="p1" onchange="up('p1n', this.value)"></div>
                <div><label>Non-Striker</label><input id="p2" onchange="up('p2n', this.value)"></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                <div><label>Bowler</label><input id="bw" onchange="up('bwn', this.value)"></div>
                <div><label>Target</label><input type="number" id="tg" onchange="upNum('target', this.value)"></div>
            </div>
        </div>

        <div class="card">
            <h4>Match Setup</h4>
            <label>Batting Team</label>
            <input id="tm" onchange="up('batTeam', this.value)">
            <button class="btn-util" onclick="resetMatch()">START FRESH MATCH (RESET ALL)</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');
        let lastBall = null;

        // DATA PERSISTENCE: Sync UI with Firebase values on load
        onValue(mRef, (snap) => {
            const d = snap.val();
            if(!d) return;
            document.getElementById('tm').value = d.batTeam || "";
            document.getElementById('p1').value = d.p1n || "";
            document.getElementById('p2').value = d.p2n || "";
            document.getElementById('bw').value = d.bwn || "";
            document.getElementById('tg').value = d.target || 0;
            // Force Iframe Refresh
            document.getElementById('previewFrame').src = document.getElementById('previewFrame').src;
        });

        window.ball = async (r, ex) => {
            const snap = await get(mRef); const d = snap.val();
            lastBall = JSON.parse(JSON.stringify(d));
            d.runs += r; d.bwr += r;
            if(!ex) {
                d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0 || d.balls % 6 === 0) d.str = d.str === 1 ? 2 : 1;
            }
            update(mRef, d);
        };

        window.wicket = async () => {
            const snap = await get(mRef); const d = snap.val();
            lastBall = JSON.parse(JSON.stringify(d));
            d.wkts++; d.balls++; d.bww++; update(mRef, d);
        };

        window.undo = () => { if(lastBall) set(mRef, lastBall); };
        window.up = (k, v) => update(mRef, {[k]: v});
        window.upNum = (k, v) => update(mRef, {[k]: parseInt(v)});

        window.resetMatch = async () => {
            if(!confirm("Reset everything to 0?")) return;
            await set(mRef, {
                batTeam: "TEAM A", runs:0, wkts:0, balls:0, str:1, target:0,
                p1n:"Bat 1", p1r:0, p1b:0, p2n:"Bat 2", p2r:0, p2b:0,
                bwn:"Bowler", bwr:0, bww:0, bwb:0
            });
        };
    </script>
</body>
</html>
