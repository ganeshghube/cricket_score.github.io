<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .section { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: #333; color: white; }
        .btn-run { background: #2e7d32; }
        .btn-wicket { background: #c62828; }
        .btn-extra { background: #ef6c00; }
        input { width: 90%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; }
        h4 { margin: 5px 0; color: #f1c40f; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="setupView" class="section">
        <h3>Match Setup (11 Players)</h3>
        <input id="teamAName" placeholder="Team Name">
        <textarea id="teamAPlayers" rows="6" style="width:90%" placeholder="Enter 11 names (one per line)"></textarea>
        <button style="width:100%; background:#2196f3" onclick="startMatch()">START MATCH</button>
    </div>

    <div id="matchView" class="section hidden">
        <h4 id="liveTitle">LIVE CONTROL</h4>
        <div style="font-size: 24px; margin-bottom:10px;" id="display">0-0 (0.0)</div>
        
        <div class="grid">
            <button class="btn-run" onclick="handleBall(0)">0</button>
            <button class="btn-run" onclick="handleBall(1)">1</button>
            <button class="btn-run" onclick="handleBall(2)">2</button>
            <button class="btn-run" onclick="handleBall(4)">4</button>
            <button class="btn-run" onclick="handleBall(6)">6</button>
            <button class="btn-extra" onclick="handleBall(1, true)">WD/NB</button>
            <button class="btn-wicket" onclick="handleWicket()">WICKET</button>
            <button onclick="swapStrike()">SWAP</button>
        </div>
        <hr>
        <button style="width:100%" onclick="document.getElementById('setupView').classList.toggle('hidden')">Edit Squad</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {             
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'matchState');

        window.startMatch = async () => {
            const players = document.getElementById('teamAPlayers').value.split('\n');
            const teamName = document.getElementById('teamAName').value;
            
            const initialState = {
                currentBattingTeam: teamName,
                runs: 0, wickets: 0, balls: 0,
                strikerName: players[0] || "Bat 1", strikerRuns: 0, strikerBalls: 0,
                nonStrikerName: players[1] || "Bat 2", nonStrikerRuns: 0, nonStrikerBalls: 0,
                onStrike: 1,
                currentBowler: "Bowler", bwlRuns: 0, bwlWkts: 0, bwlBalls: 0,
                nextPlayerIndex: 2,
                fullSquad: players
            };
            await set(matchRef, initialState);
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('matchView').classList.remove('hidden');
        };

        window.handleBall = async (r, isExtra) => {
            const snap = await get(matchRef);
            const d = snap.val();
            d.runs += r;
            if(!isExtra) {
                d.balls += 1; d.bwlBalls += 1;
                if(d.onStrike === 1) { d.strikerRuns += r; d.strikerBalls += 1; }
                else { d.nonStrikerRuns += r; d.nonStrikerBalls += 1; }
                if(r % 2 !== 0) d.onStrike = d.onStrike === 1 ? 2 : 1;
                if(d.balls % 6 === 0) d.onStrike = d.onStrike === 1 ? 2 : 1;
            }
            d.bwlRuns += r;
            set(matchRef, d);
            updateUI(d);
        };

        window.handleWicket = async () => {
            const snap = await get(matchRef);
            const d = snap.val();
            d.wickets += 1; d.balls += 1; d.bwlWkts += 1;
            const nextName = d.fullSquad[d.nextPlayerIndex] || "End of Innings";
            if(d.onStrike === 1) { d.strikerName = nextName; d.strikerRuns = 0; d.strikerBalls = 0; }
            else { d.nonStrikerName = nextName; d.nonStrikerRuns = 0; d.nonStrikerBalls = 0; }
            d.nextPlayerIndex++;
            set(matchRef, d);
            updateUI(d);
        };

        function updateUI(d) {
            document.getElementById('display').innerText = `${d.runs}-${d.wickets} (${Math.floor(d.balls/6)}.${d.balls%6})`;
        }
    </script>
</body>
</html>
