<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .run { background: #2ecc71; }
        .wicket { background: #e74c3c; }
        .extra { background: #f39c12; }
        .control { background: #3498db; grid-column: span 2; }
        input { width: 90%; padding: 8px; margin-bottom: 5px; background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>
    <h3>Match Setup</h3>
    <input id="teamInp" placeholder="Team Name">
    <input id="p1Inp" placeholder="Striker Name">
    <input id="p2Inp" placeholder="Non-Striker Name">
    <input id="bwlInp" placeholder="Bowler Name">
    <button class="control" onclick="updateInfo()">Update Lineup</button>

    <div class="btn-grid">
        <button class="run" onclick="addBall(0)">0</button>
        <button class="run" onclick="addBall(1)">1</button>
        <button class="run" onclick="addBall(2)">2</button>
        <button class="run" onclick="addBall(4)">4</button>
        <button class="run" onclick="addBall(6)">6</button>
        <button class="extra" onclick="addBall(1, true)">WD/NB</button>
        <button class="wicket" onclick="addWicket()">WICKET</button>
        <button class="control" onclick="swap()">Swap Strike</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { /* YOUR CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'match/');

        window.updateInfo = async () => {
            const data = (await get(matchRef)).val() || {};
            set(matchRef, {
                ...data,
                battingTeam: document.getElementById('teamInp').value,
                p1Name: document.getElementById('p1Inp').value,
                p2Name: document.getElementById('p2Inp').value,
                bwlName: document.getElementById('bwlInp').value,
                runs: data.runs || 0, wickets: data.wickets || 0, balls: data.balls || 0,
                p1Runs: 0, p1Balls: 0, p2Runs: 0, p2Balls: 0, striker: 1,
                bwlRuns: 0, bwlWkts: 0, bwlBalls: 0
            });
        };

        window.addBall = async (r, isExtra=false) => {
            const d = (await get(matchRef)).val();
            d.runs += r;
            if(!isExtra) {
                d.balls += 1;
                d.bwlBalls += 1;
                if(d.striker === 1) { d.p1Runs += r; d.p1Balls += 1; }
                else { d.p2Runs += r; d.p2Balls += 1; }
                // Swap strike on odd runs
                if(r % 2 !== 0) d.striker = d.striker === 1 ? 2 : 1;
                // Swap strike on end of over
                if(d.balls % 6 === 0) d.striker = d.striker === 1 ? 2 : 1;
            }
            d.bwlRuns += r;
            set(matchRef, d);
        };

        window.addWicket = async () => {
            const d = (await get(matchRef)).val();
            d.wickets += 1;
            d.balls += 1;
            d.bwlWkts += 1;
            // In a real app, you'd prompt for a new player name here
            if(d.striker === 1) { d.p1Name = "New Player"; d.p1Runs = 0; d.p1Balls = 0; }
            else { d.p2Name = "New Player"; d.p2Runs = 0; d.p2Balls = 0; }
            set(matchRef, d);
        };

        window.swap = async () => {
            const d = (await get(matchRef)).val();
            d.striker = d.striker === 1 ? 2 : 1;
            set(matchRef, d);
        };
    </script>
</body>
</html>
