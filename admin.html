<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cricket Master Control Pro</title>
    <style>
        :root { --primary: #f1c40f; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        
        .preview-header { background: #222; padding: 10px; font-size: 12px; color: #888; text-align: center; border-bottom: 1px solid #333; }
        .preview-container { width: 100%; height: 180px; background: #333; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; transform: scale(0.8); transform-origin: top center; }

        .content { padding: 15px; display: grid; gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { padding: 12px 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-run { background: #27ae60; color: white; }
        .btn-wkt { background: #c0392b; color: white; }
        .btn-extra { background: #e67e22; color: white; }
        .btn-util { background: #34495e; color: white; }
        .btn-danger { background: #8e44ad; color: white; } /* Purple for swap */
        .btn-wipe { background: #333; color: #ff4d4d; border: 1px solid #ff4d4d; }
        
        input, textarea, select { 
            width: 100%; padding: 10px; margin: 8px 0; 
            background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;
        }
        h4 { margin-top: 0; color: var(--primary); text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="preview-header">LIVE STREAM OVERLAY PREVIEW</div>
    <div class="preview-container">
        <iframe src="index.html"></iframe>
    </div>

    <div class="content">
        <div class="card">
            <h4>1. Team Squads</h4>
            <input id="teamNameA" placeholder="Team A Name (Batting First)">
            <textarea id="squadA" rows="3" placeholder="Team A: 11 Names (one per line)"></textarea>
            <input id="teamNameB" placeholder="Team B Name (Bowling First)">
            <textarea id="squadB" rows="3" placeholder="Team B: 11 Names (one per line)"></textarea>
            <button class="btn-util" style="width:100%; background: #2980b9;" onclick="initMatch()">Initialize Match</button>
        </div>

        <div class="card">
            <h4>2. Field Management</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label style="font-size:10px">STRIKER</label>
                    <select id="selP1" onchange="changePlayer('p1n', this.value)"></select>
                </div>
                <div>
                    <label style="font-size:10px">NON-STRIKER</label>
                    <select id="selP2" onchange="changePlayer('p2n', this.value)"></select>
                </div>
            </div>
            <label style="font-size:10px">CURRENT BOWLER</label>
            <select id="selBw" onchange="changePlayer('bwn', this.value)"></select>
        </div>

        <div class="card">
            <h4>3. Live Scoring</h4>
            <div class="grid-4">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(3)">3</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button class="btn-extra" onclick="ball(1, true)">WD</button>
                <button class="btn-extra" onclick="ball(1, true)">NB</button>
            </div>
            <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-wkt" onclick="wicket()">WICKET</button>
                <button class="btn-util" onclick="swapStrike()">SWAP STRIKE</button>
            </div>
        </div>

        <div class="card">
            <h4>4. Match Functions</h4>
            <button class="btn-danger" style="width:100%; margin-bottom:10px;" onclick="swapInnings()">
                START SECOND INNINGS (Swap Teams)
            </button>
            <button class="btn-wipe" style="width:100%;" onclick="fullReset()">
                CLEAR ALL FIREBASE DATA
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');

        window.initMatch = async () => {
            const sA = document.getElementById('squadA').value.split('\n').filter(n => n.trim() !== "");
            const sB = document.getElementById('squadB').value.split('\n').filter(n => n.trim() !== "");
            const data = {
                batTeam: document.getElementById('teamNameA').value || "TEAM A",
                bowlTeam: document.getElementById('teamNameB').value || "TEAM B",
                runs:0, wkts:0, balls:0, str:1,
                p1n:sA[0] || "Batsman 1", p1r:0, p1b:0, 
                p2n:sA[1] || "Batsman 2", p2r:0, p2b:0,
                bwn:sB[0] || "Bowler", bwr:0, bww:0, bwb:0
            };
            await set(mRef, data);
            fillSelects(sA, sB);
            alert("Match Initialized!");
        };

        function fillSelects(battingSquad, bowlingSquad) {
            const batHtml = battingSquad.map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            const bwlHtml = bowlingSquad.map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            document.getElementById('selP1').innerHTML = batHtml;
            document.getElementById('selP2').innerHTML = batHtml;
            document.getElementById('selBw').innerHTML = bwlHtml;
        }

        window.ball = async (r, ex) => {
            const snap = await get(mRef); const d = snap.val();
            d.runs += r; d.bwr += r;
            if(!ex) {
                d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0) swapLocal(d);
                if(d.balls % 6 === 0) swapLocal(d);
            }
            update(mRef, d);
        };

        window.wicket = async () => {
            const snap = await get(mRef); const d = snap.val();
            d.wkts++; d.balls++; d.bww++;
            update(mRef, d);
        };

        window.swapInnings = async () => {
            if(confirm("Swap teams for 2nd Innings? Scores will reset.")) {
                const snap = await get(mRef); const d = snap.val();
                const sA = document.getElementById('squadA').value.split('\n');
                const sB = document.getElementById('squadB').value.split('\n');
                
                // Swap the team names and squads
                const newBatTeam = d.bowlTeam;
                const newBowlTeam = d.batTeam;
                
                await set(mRef, {
                    batTeam: newBatTeam, bowlTeam: newBowlTeam,
                    runs:0, wkts:0, balls:0, str:1,
                    p1n:sB[0], p1r:0, p1b:0, p2n:sB[1], p2r:0, p2b:0,
                    bwn:sA[0], bwr:0, bww:0, bwb:0
                });
                fillSelects(sB, sA);
                alert("Second Innings Started! " + newBatTeam + " is batting.");
            }
        };

        window.fullReset = async () => {
            if(confirm("DELETE EVERYTHING? This wipes the Firebase database.")) {
                await set(mRef, null);
                alert("Database wiped. Refreshing page...");
                location.reload();
            }
        };

        window.changePlayer = (key, val) => update(mRef, { [key]: val });
        window.swapStrike = async () => { const snap = await get(mRef); const d = snap.val(); swapLocal(d); update(mRef, d); };
        function swapLocal(d) { d.str = d.str === 1 ? 2 : 1; }
    </script>
</body>
</html>
