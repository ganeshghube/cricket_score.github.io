<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cricket Admin Control</title>
    <style>
        :root { --primary: #f1c40f; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        .preview-header { background: #222; padding: 8px; font-size: 11px; color: #888; display: flex; justify-content: center; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
        .preview-container { width: 100%; height: 180px; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        iframe { width: 1000px; height: 400px; border: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%) scale(0.35); transform-origin: top center; }
        .content { padding: 12px; display: grid; gap: 12px; max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        @media (min-width: 700px) { .grid-4 { grid-template-columns: repeat(4, 1fr); } iframe { transform: translateX(-50%) scale(0.7); } .preview-container { height: 320px; } }
        button { padding: 12px 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.15s; font-size: 14px; }
        button:active { opacity: 0.7; transform: scale(0.96); }
        .btn-run { background: #27ae60; color: white; }
        .btn-wkt { background: #c0392b; color: white; }
        .btn-extra { background: #e67e22; color: white; }
        .btn-util { background: #34495e; color: white; }
        .btn-danger { background: #8e44ad; color: white; }
        .btn-wipe { background: #000; color: #ff4d4d; border: 1px solid #ff4d4d; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-top: 5px; }
        h4 { margin: 0 0 10px 0; color: var(--primary); text-transform: uppercase; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="preview-header">LIVE PREVIEW</div>
    <div class="preview-container"><iframe id="prevFrame" src="index.html"></iframe></div>
    <div class="content">
        <div class="card">
            <h4>1. Team Squads</h4>
            <div class="grid-2">
                <div><label>Batting Team</label><input id="teamNameA" placeholder="India"><textarea id="squadA" rows="4"></textarea></div>
                <div><label>Bowling Team</label><input id="teamNameB" placeholder="Australia"><textarea id="squadB" rows="4"></textarea></div>
            </div>
            <button class="btn-util" style="width:100%; background: #2980b9; margin-top:10px;" onclick="initMatch()">INITIALIZE MATCH</button>
        </div>
        <div class="card">
            <h4>2. Field Management</h4>
            <div class="grid-2">
                <div><label>Striker (*)</label><select id="selP1" onchange="changePlayer('p1n', this.value)"></select></div>
                <div><label>Non-Striker</label><select id="selP2" onchange="changePlayer('p2n', this.value)"></select></div>
            </div>
            <label>Current Bowler</label><select id="selBw" onchange="changePlayer('bwn', this.value)"></select>
        </div>
        <div class="card">
            <h4>3. Live Scoring</h4>
            <div class="grid-4">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(3)">3</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button class="btn-extra" onclick="ball(1, 'WD')">WD</button>
                <button class="btn-extra" onclick="ball(1, 'NB')">NB</button>
            </div>
            <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-wkt" onclick="wicket()">WICKET</button>
                <button class="btn-util" onclick="swapStrike()">SWAP STRIKE</button>
            </div>
        </div>
        <div class="card">
            <h4>4. Error Correction</h4>
            <div class="grid-4">
                <div><label>Runs</label><input type="number" id="fixR" onchange="manualUpdate('runs', this.value)"></div>
                <div><label>Wkts</label><input type="number" id="fixW" onchange="manualUpdate('wkts', this.value)"></div>
                <div><label>Overs</label><input type="number" step="0.1" id="fixO" onchange="updateOvers(this.value)"></div>
                <div><label>Target</label><input type="number" id="fixT" onchange="manualUpdate('target', this.value)"></div>
            </div>
        </div>
        <div class="card">
            <button class="btn-danger" style="width:100%; margin-bottom:10px;" onclick="swapInnings()">2ND INNINGS</button>
            <button class="btn-wipe" style="width:100%;" onclick="fullReset()">RESET ALL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU", authDomain: "cricket-8e338.firebaseapp.com", projectId: "cricket-8e338", storageBucket: "cricket-8e338.firebasestorage.app", messagingSenderId: "41064243639", appId: "1:41064243639:web:d99e0d8f64b1bbca20c832" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');
        const sRef = ref(db, 'squads');

        onValue(mRef, (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('teamNameA').value = d.batTeam || "";
            document.getElementById('teamNameB').value = d.bowlTeam || "";
            document.getElementById('fixR').value = d.runs; document.getElementById('fixW').value = d.wkts; document.getElementById('fixT').value = d.target || 0;
            const balls = d.balls || 0; document.getElementById('fixO').value = (Math.floor(balls/6) + (balls%6)/10).toFixed(1);
        });

        onValue(sRef, (snap) => {
            const s = snap.val(); if(!s) return;
            document.getElementById('squadA').value = s.sqA || ""; document.getElementById('squadB').value = s.sqB || "";
            fillSelects(s.sqA.split('\n'), s.sqB.split('\n'));
        });

        window.initMatch = async () => {
            const sA = document.getElementById('squadA').value.split('\n').filter(n => n.trim() !== "");
            const sB = document.getElementById('squadB').value.split('\n').filter(n => n.trim() !== "");
            const data = { batTeam: document.getElementById('teamNameA').value.toUpperCase() || "TEAM A", bowlTeam: document.getElementById('teamNameB').value.toUpperCase() || "TEAM B", runs:0, wkts:0, balls:0, str:1, target:0, p1n:sA[0] || "Bat 1", p1r:0, p1b:0, p2n:sA[1] || "Bat 2", p2r:0, p2b:0, bwn:sB[0] || "Bowler", bwr:0, bww:0, bwb:0, recentBalls: [] };
            await set(mRef, data); await set(sRef, { sqA: document.getElementById('squadA').value, sqB: document.getElementById('squadB').value });
            alert("Match Initialized!");
        };

        function fillSelects(bat, bowl) {
            const bH = bat.filter(n=>n.trim()!=="").map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            const wH = bowl.filter(n=>n.trim()!=="").map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            document.getElementById('selP1').innerHTML = bH; document.getElementById('selP2').innerHTML = bH; document.getElementById('selBw').innerHTML = wH;
        }

        window.ball = async (r, type) => {
            const snap = await get(mRef); const d = snap.val();
            if(!d.recentBalls) d.recentBalls = [];
            d.runs += r; d.bwr += r;
            if(type === 'WD' || type === 'NB') { d.recentBalls.push(type); } 
            else {
                d.recentBalls.push(r); d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0 || d.balls % 6 === 0) d.str = d.str === 1 ? 2 : 1;
                if(d.balls % 6 === 0) d.recentBalls = []; 
            }
            if(d.recentBalls.length > 6) d.recentBalls.shift();
            update(mRef, d);
        };

        window.wicket = async () => {
            const snap = await get(mRef); const d = snap.val();
            if(!d.recentBalls) d.recentBalls = [];
            d.recentBalls.push('W'); d.wkts++; d.balls++; d.bww++; 
            if(d.balls % 6 === 0) d.recentBalls = [];
            update(mRef, d);
        };

        window.updateOvers = (val) => {
            const num = parseFloat(val);
            const totalBalls = (Math.floor(num) * 6) + Math.round((num % 1) * 10);
            update(mRef, { balls: totalBalls, recentBalls: [] });
        };

        window.manualUpdate = (field, val) => update(mRef, { [field]: parseInt(val) });
        window.changePlayer = (key, val) => update(mRef, { [key]: val });
        window.swapStrike = async () => { const snap = await get(mRef); const d = snap.val(); d.str = d.str === 1 ? 2 : 1; update(mRef, d); };
        window.swapInnings = async () => {
            const snap = await get(mRef); const d = snap.val();
            const sB = document.getElementById('squadB').value.split('\n');
            const sA = document.getElementById('squadA').value.split('\n');
            await set(mRef, { batTeam: d.bowlTeam, bowlTeam: d.batTeam, runs:0, wkts:0, balls:0, str:1, target: d.runs + 1, p1n:sB[0] || "Bat 1", p1r:0, p1b:0, p2n:sB[1] || "Bat 2", p2r:0, p2b:0, bwn:sA[0] || "Bowler", bwr:0, bww:0, bwb:0, recentBalls: [] });
            alert("2nd Innings Started!");
        };
        window.fullReset = async () => { if(confirm("Clear ALL?")) { await set(mRef, null); await set(sRef, null); location.reload(); } };
    </script>
</body>
</html>
