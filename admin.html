<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cricket Admin Master Pro</title>
    <style>
        :root { --primary: #f1c40f; --bg: #000; --card: #1a1a1a; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        .preview-container { width: 100%; height: 160px; background: #333; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        iframe { width: 100%; height: 100%; border: none; transform: scale(0.75); transform-origin: top center; }
        .content { padding: 12px; display: grid; gap: 12px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h4 { margin: 0 0 10px 0; color: var(--primary); text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .grid-scoring { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        button { padding: 12px 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-run { background: #1b5e20; color: white; }
        .btn-wkt { background: #b71c1c; color: white; }
        .btn-extra { background: #e65100; color: white; }
        .btn-util { background: #0d47a1; color: white; }
        .btn-swap { background: #6a1b9a; color: white; }
        .btn-undo { background: #444; color: white; }
        .btn-wipe { background: #000; color: #ff5252; border: 1px solid #ff5252; margin-top: 10px; }
        label { font-size: 10px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="preview-container">
        <iframe id="previewFrame" src="index.html"></iframe>
    </div>

    <div class="content">
        
        <div class="card">
            <h4>1. Team Setup</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Batting</label><input id="teamNameA" placeholder="Team A"><textarea id="squadA" rows="3"></textarea></div>
                <div><label>Bowling</label><input id="teamNameB" placeholder="Team B"><textarea id="squadB" rows="3"></textarea></div>
            </div>
            <label>Set Match Target (Optional)</label>
            <input type="number" id="matchTarget" placeholder="Enter Target Runs" onchange="manualFix('target', this.value)">
            <button class="btn-util" style="width:100%" onclick="initMatch()">INITIALIZE MATCH</button>
        </div>

        <div class="card">
            <h4>2. Field Management</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Striker</label><select id="selP1" onchange="changePlayer('p1n', this.value)"></select></div>
                <div><label>Non-Striker</label><select id="selP2" onchange="changePlayer('p2n', this.value)"></select></div>
            </div>
            <label>Current Bowler</label>
            <select id="selBw" onchange="changePlayer('bwn', this.value)"></select>
        </div>

        <div class="card">
            <h4>3. Live Scoring</h4>
            <div class="grid-scoring">
                <button class="btn-run" onclick="ball(0)">0</button>
                <button class="btn-run" onclick="ball(1)">1</button>
                <button class="btn-run" onclick="ball(2)">2</button>
                <button class="btn-run" onclick="ball(3)">3</button>
                <button class="btn-run" onclick="ball(4)">4</button>
                <button class="btn-run" onclick="ball(6)">6</button>
                <button class="btn-extra" onclick="ball(1, true)">WD</button>
                <button class="btn-extra" onclick="ball(1, true)">NB</button>
            </div>
            <div style="margin-top:10px; display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                <button class="btn-wkt" onclick="wicket()">WICKET</button>
                <button class="btn-undo" onclick="undoLast()">UNDO</button>
            </div>
        </div>

        <div class="card">
            <h4>4. Quick Correction</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                <div><label>Runs</label><input type="number" id="fixRuns" onchange="manualFix('runs', this.value)"></div>
                <div><label>Wkts</label><input type="number" id="fixWkts" onchange="manualFix('wkts', this.value)"></div>
                <div><label>Overs (e.g. 5.2)</label><input type="number" step="0.1" id="fixOvers" placeholder="5.2" onchange="overFix(this.value)"></div>
            </div>
        </div>

        <div class="card">
            <h4>5. Match Control</h4>
            <button class="btn-swap" style="width:100%" onclick="swapInnings()">START 2ND INNINGS (SWAP)</button>
            <button class="btn-wipe" style="width:100%" onclick="fullReset()">RESET FIREBASE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mRef = ref(db, 'cricket');
        let lastState = null;

        window.initMatch = async () => {
            const sA = document.getElementById('squadA').value.split('\n').filter(n => n.trim() !== "");
            const sB = document.getElementById('squadB').value.split('\n').filter(n => n.trim() !== "");
            const target = parseInt(document.getElementById('matchTarget').value) || 0;
            const data = {
                batTeam: document.getElementById('teamNameA').value || "TEAM A",
                bowlTeam: document.getElementById('teamNameB').value || "TEAM B",
                runs:0, wkts:0, balls:0, str:1, target:target,
                p1n:sA[0] || "Bat 1", p1r:0, p1b:0, p2n:sA[1] || "Bat 2", p2r:0, p2b:0,
                bwn:sB[0] || "Bowler", bwr:0, bww:0, bwb:0
            };
            await set(mRef, data);
            fillSelects(sA, sB);
            alert("Ready!");
        };

        function fillSelects(batting, bowling) {
            const bH = batting.map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            const wH = bowling.map(n => `<option value="${n.trim()}">${n.trim()}</option>`).join('');
            document.getElementById('selP1').innerHTML = bH; document.getElementById('selP2').innerHTML = bH;
            document.getElementById('selBw').innerHTML = wH;
        }

        window.ball = async (r, ex) => {
            const snap = await get(mRef); const d = snap.val();
            lastState = JSON.parse(JSON.stringify(d));
            d.runs += r; d.bwr += r;
            if(!ex) {
                d.balls++; d.bwb++;
                if(d.str === 1) { d.p1r += r; d.p1b++; } else { d.p2r += r; d.p2b++; }
                if(r % 2 !== 0 || d.balls % 6 === 0) d.str = d.str === 1 ? 2 : 1;
            }
            update(mRef, d);
        };

        window.overFix = async (val) => {
            const parts = val.toString().split('.');
            const totalBalls = (parseInt(parts[0]) * 6) + (parseInt(parts[1]) || 0);
            await update(mRef, { balls: totalBalls });
        };

        window.manualFix = async (f, v) => { if(v!=="") await update(mRef, {[f]: parseInt(v)}); };
        window.changePlayer = (k, v) => update(mRef, { [k]: v });
        window.swapStrike = async () => { 
            const snap = await get(mRef); const d = snap.val(); 
            d.str = d.str === 1 ? 2 : 1; update(mRef, d); 
        };
        window.undoLast = async () => { if(lastState) { await set(mRef, lastState); lastState = null; } };
        window.swapInnings = async () => { /* Logic similar to initMatch but swapping d.batTeam/bowlTeam and resetting runs */ };
        window.fullReset = async () => { if(confirm("Wipe all?")) { await set(mRef, null); location.reload(); } };
    </script>
</body>
</html>
