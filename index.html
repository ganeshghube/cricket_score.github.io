<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricket Slim Overlay</title>
    <style>
        /* 1080p Canvas */
        body { 
            width: 1920px; 
            height: 1080px; 
            margin: 0; 
            padding: 0; 
            background: transparent; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Compact Ribbon Container */
        .ribbon {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            height: 54px; /* Short height */
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
            min-width: 1000px;
        }

        /* Team & Main Score */
        .score-section {
            background: #f1c40f;
            color: #000;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: 900;
            font-size: 24px;
            gap: 15px;
        }
        .overs-tag { font-size: 16px; font-weight: bold; opacity: 0.8; }

        /* Batsmen Area */
        .batsmen-area {
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            padding: 0 30px;
            color: #fff;
            font-size: 18px;
        }
        .player-info { display: flex; align-items: center; gap: 8px; }
        .player-info.active { color: #f1c40f; }
        .player-info.active::before { content: '●'; font-size: 10px; }
        .runs-small { font-size: 15px; color: #aaa; }

        /* Bowler Area */
        .bowler-area {
            background: rgba(255, 255, 255, 0.05);
            height: 100%;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .label { font-size: 11px; color: #f1c40f; font-weight: bold; text-transform: uppercase; }

        /* Target Popup (Minimalist) */
        .target-tag {
            background: #fff;
            color: #000;
            padding: 2px 10px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 4px;
            margin-left: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="ribbon">
        <div class="score-section">
            <span id="disp-team">TEAM</span>
            <span id="disp-score">0-0</span>
            <span class="overs-tag" id="disp-ovs">0.0</span>
            <div id="target-ui" class="target-tag">TARGET: <span id="disp-target">0</span></div>
        </div>

        <div class="batsmen-area">
            <div id="p1-box" class="player-info">
                <span id="p1-n">Player 1</span>
                <span class="runs-small" id="p1-s">0(0)</span>
            </div>
            <div id="p2-box" class="player-info">
                <span id="p2-n">Player 2</span>
                <span class="runs-small" id="p2-s">0(0)</span>
            </div>
        </div>

        <div class="bowler-area">
            <div>
                <span class="label">Bwl</span><br>
                <span id="disp-bwn">Bowler</span>
            </div>
            <div style="text-align: right;">
                <span id="disp-bw-stats" style="font-weight: bold;">0-0</span><br>
                <span id="disp-bw-ovs" style="font-size: 12px; color: #aaa;">(0.0)</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const cricketRef = ref(db, 'cricket');

        onValue(cricketRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Basic Score
            document.getElementById('disp-team').innerText = data.batTeam;
            document.getElementById('disp-score').innerText = `${data.runs}-${data.wkts}`;
            document.getElementById('disp-ovs').innerText = `${Math.floor(data.balls/6)}.${data.balls%6}`;

            // Batsmen
            document.getElementById('p1-n').innerText = data.p1n;
            document.getElementById('p1-s').innerText = `${data.p1r}(${data.p1b})`;
            document.getElementById('p1-box').className = data.str === 1 ? 'player-info active' : 'player-info';

            document.getElementById('p2-n').innerText = data.p2n;
            document.getElementById('p2-s').innerText = `${data.p2r}(${data.p2b})`;
            document.getElementById('p2-box').className = data.str === 2 ? 'player-info active' : 'player-info';

            // Bowler
            document.getElementById('disp-bwn').innerText = data.bwn;
            document.getElementById('disp-bw-stats').innerText = `${data.bww}-${data.bwr}`;
            document.getElementById('disp-bw-ovs').innerText = `(${Math.floor(data.bwb/6)}.${data.bwb%6})`;

            // Target
            if(data.target > 0) {
                document.getElementById('target-ui').style.display = 'block';
                document.getElementById('disp-target').innerText = data.target;
            } else {
                document.getElementById('target-ui').style.display = 'none';
            }
        });
    </script>
</body>
</html>
