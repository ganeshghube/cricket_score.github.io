<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; margin: 0; font-family: 'Arial', sans-serif; color: white; overflow: hidden; }
        .score-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(0, 0, 0, 0.85); border-bottom: 4px solid #f1c40f;
            padding: 10px 20px; border-radius: 5px; align-items: center; min-width: 850px;
        }
        .team { font-size: 28px; font-weight: bold; padding-right: 15px; border-right: 2px solid #555; }
        .batsmen { flex-grow: 1; display: flex; gap: 30px; padding: 0 20px; }
        .active { color: #f1c40f; } .active::after { content: '*'; }
        .bowler { padding-left: 15px; border-left: 2px solid #555; color: #ccc; }
        .stat { font-size: 14px; color: #aaa; display: block; }
    </style>
</head>
<body>
    <div class="score-bar">
        <div class="team"><span id="tName">TEAM</span> <span id="total">0-0</span> <small id="ovs">(0.0)</small></div>
        <div class="batsmen">
            <div id="b1Box"> <span id="n1">P1</span> <span class="stat" id="s1">0(0)</span> </div>
            <div id="b2Box"> <span id="n2">P2</span> <span class="stat" id="s2">0(0)</span> </div>
        </div>
        <div class="bowler">
            <span id="bn">Bowler</span> <span class="stat" id="bs">0-0 (0.0)</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'cricket'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('tName').innerText = d.batTeam;
            document.getElementById('total').innerText = `${d.runs}-${d.wkts}`;
            document.getElementById('ovs').innerText = `(${Math.floor(d.balls/6)}.${d.balls%6})`;
            document.getElementById('n1').innerText = d.p1n; document.getElementById('s1').innerText = `${d.p1r}(${d.p1b})`;
            document.getElementById('n2').innerText = d.p2n; document.getElementById('s2').innerText = `${d.p2r}(${d.p2b})`;
            document.getElementById('bn').innerText = d.bwn; document.getElementById('bs').innerText = `${d.bww}-${d.bwr} (${Math.floor(d.bwb/6)}.${d.bwb%6})`;
            document.getElementById('b1Box').className = d.str === 1 ? 'active' : '';
            document.getElementById('b2Box').className = d.str === 2 ? 'active' : '';
        });
    </script>
</body>
</html>
