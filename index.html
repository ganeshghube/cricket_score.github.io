<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Live Score Responsive Overlay</title>
    <style>
        :root { --accent: #f1c40f; --bg-glass: rgba(10, 10, 10, 0.9); }
        
        body { 
            background-color: rgba(0, 0, 0, 0); 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: white; 
        }

        /* Responsive Container */
        .score-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap; /* Allows stacking on mobile */
            background: var(--bg-glass);
            border-bottom: 4px solid var(--accent);
            padding: 10px 15px;
            border-radius: 8px;
            align-items: center;
            width: 95%;      /* Mobile width */
            max-width: 900px; /* Desktop max width */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* Sections common styles */
        .section { padding: 5px 10px; box-sizing: border-box; }

        /* Team & Score Section */
        .team-section {
            flex: 1 1 100%; /* Full width on mobile by default */
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
        }
        .team-name { font-size: 20px; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        .score-main { font-size: 24px; font-weight: 900; }
        .overs { font-size: 14px; color: #aaa; margin-left: 5px; }

        /* Batsmen Section */
        .batsmen-section {
            flex: 2 1 200px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .player { font-size: 15px; font-weight: 500; color: #ddd; white-space: nowrap; }
        .player.active { color: var(--accent); }
        .player.active::after { content: '*'; margin-left: 2px; }
        .p-stats { font-size: 12px; color: #888; display: block; }

        /* Bowler Section */
        .bowler-section {
            flex: 1 1 150px;
            border-left: 1px solid #444;
            text-align: right;
        }
        .bowler-name { font-size: 15px; color: #eee; font-weight: bold; display: block; }
        .bowler-stats { font-size: 12px; color: #888; }
        
        /* Target Label */
        .target-ui {
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 1px;
            order: -1; /* Keep at top */
            margin-bottom: 4px;
        }

        /* DESKTOP ADJUSTMENTS (Screens wider than 768px) */
        @media (min-width: 768px) {
            .score-bar { flex-wrap: nowrap; padding: 12px 25px; }
            .team-section { 
                flex: 0 0 auto; 
                flex-direction: column; 
                border-right: 2px solid #444; 
                border-bottom: none; 
                margin-bottom: 0; 
                padding-right: 20px;
                align-items: flex-start;
            }
            .team-name { font-size: 24px; }
            .score-main { font-size: 28px; }
            .batsmen-section { padding: 0 30px; }
            .player { font-size: 18px; }
            .p-stats { font-size: 14px; }
            .bowler-section { flex: 0 0 auto; min-width: 160px; padding-left: 20px; }
            .target-ui { position: absolute; top: -25px; left: 0; text-align: left; font-size: 13px; }
        }

        /* Animation */
        .update-flash { animation: flash 0.5s ease-in-out; }
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; color: var(--accent); }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="score-bar" id="scoreBar">
        <div id="target-ui" class="target-ui" style="display: none;">
            TARGET: <span id="disp-target">0</span>
        </div>

        <div class="team-section section">
            <span class="team-name" id="disp-team">TEAM</span>
            <div class="score-main">
                <span id="disp-runs">0</span>-<span id="disp-wkts">0</span>
                <span class="overs">OV <span id="disp-ovs">0.0</span></span>
            </div>
        </div>

        <div class="batsmen-section section">
            <div id="p1-box" class="player">
                <span id="disp-p1n">Batsman 1</span>
                <span class="p-stats"><span id="disp-p1r">0</span>(<span id="disp-p1b">0</span>)</span>
            </div>
            <div id="p2-box" class="player">
                <span id="disp-p2n">Batsman 2</span>
                <span class="p-stats"><span id="disp-p2r">0</span>(<span id="disp-p2b">0</span>)</span>
            </div>
        </div>

        <div class="bowler-section section">
            <span class="bowler-name" id="disp-bwn">Bowler</span>
            <span class="bowler-stats">
                <span id="disp-bww">0</span>-<span id="disp-bwr">0</span> 
                (<span id="disp-bwb">0.0</span>)
            </span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const cricketRef = ref(db, 'cricket');

        onValue(cricketRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('disp-team').innerText = data.batTeam || "TEAM";
            document.getElementById('disp-runs').innerText = data.runs || 0;
            document.getElementById('disp-wkts').innerText = data.wkts || 0;
            
            const balls = data.balls || 0;
            document.getElementById('disp-ovs').innerText = `${Math.floor(balls / 6)}.${balls % 6}`;

            document.getElementById('disp-p1n').innerText = data.p1n || "Batsman 1";
            document.getElementById('disp-p1r').innerText = data.p1r || 0;
            document.getElementById('disp-p1b').innerText = data.p1b || 0;
            
            document.getElementById('disp-p2n').innerText = data.p2n || "Batsman 2";
            document.getElementById('disp-p2r').innerText = data.p2r || 0;
            document.getElementById('disp-p2b').innerText = data.p2b || 0;

            document.getElementById('p1-box').className = data.str === 1 ? 'player active' : 'player';
            document.getElementById('p2-box').className = data.str === 2 ? 'player active' : 'player';

            document.getElementById('disp-bwn').innerText = data.bwn || "Bowler";
            document.getElementById('disp-bwr').innerText = data.bwr || 0;
            document.getElementById('disp-bww').innerText = data.bww || 0;
            const bwb = data.bwb || 0;
            document.getElementById('disp-bwb').innerText = `${Math.floor(bwb / 6)}.${bwb % 6}`;

            const target = data.target || 0;
            if (target > 0) {
                document.getElementById('target-ui').style.display = 'block';
                document.getElementById('disp-target').innerText = target;
            } else {
                document.getElementById('target-ui').style.display = 'none';
            }

            const bar = document.getElementById('scoreBar');
            bar.classList.remove('update-flash');
            void bar.offsetWidth; 
            bar.classList.add('update-flash');
        });
    </script>
</body>
</html>
