<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Slim Overlay</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: transparent; 
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* This locks the bar to the bottom and keeps it centered */
        .master-wrapper {
            position: fixed;
            bottom: 20px; /* Space from the bottom edge */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 9999;
        }

        .ribbon {
            display: flex;
            flex-direction: row; /* Keeps everything in one line */
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            height: 50px; /* Short height */
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            min-width: 800px;
            max-width: 95%;
            overflow: hidden;
        }

        /* Team & Score Section */
        .main-score {
            background: #f1c40f;
            color: #000;
            height: 100%;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 22px;
            white-space: nowrap;
        }

        .ovs-label {
            font-size: 14px;
            margin-left: 8px;
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 3px;
        }

        /* Batsmen Section */
        .batsmen {
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            color: #fff;
            gap: 20px;
        }

        .p-unit { font-size: 16px; white-space: nowrap; }
        .p-unit.active { color: #f1c40f; font-weight: bold; }
        .p-unit.active::after { content: '*'; margin-left: 3px; }
        .p-runs { font-size: 13px; color: #aaa; margin-left: 5px; }

        /* Bowler Section */
        .bowler {
            background: rgba(255, 255, 255, 0.1);
            height: 100%;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-size: 15px;
            border-left: 1px solid #444;
            white-space: nowrap;
        }

        .bwl-n { font-weight: bold; margin-right: 8px; }
        .bwl-s { color: #f1c40f; font-size: 14px; }

        /* Target Indicator */
        .target-box {
            background: #fff;
            color: #000;
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 14px;
            border-left: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div class="master-wrapper">
        <div class="ribbon">
            <div class="main-score">
                <span id="disp-team">TEAM</span>
                <span style="margin-left:10px;" id="disp-score">0-0</span>
                <span class="ovs-label" id="disp-ovs">0.0</span>
            </div>

            <div class="batsmen">
                <div id="p1-div" class="p-unit">
                    <span id="p1-n">P1</span><span class="p-runs" id="p1-s">0(0)</span>
                </div>
                <div id="p2-div" class="p-unit">
                    <span id="p2-n">P2</span><span class="p-runs" id="p2-s">0(0)</span>
                </div>
            </div>

            <div class="bowler">
                <span class="bwl-n" id="disp-bwn">Bowler</span>
                <span class="bwl-s" id="disp-bw-stats">0-0 (0.0)</span>
            </div>

            <div id="target-ui" class="target-box" style="display:none;">
                TGT: <span id="disp-target">0</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const cricketRef = ref(db, 'cricket');

        onValue(cricketRef, (snapshot) => {
            const d = snapshot.val();
            if (!d) return;

            // Scoreboard
            document.getElementById('disp-team').innerText = d.batTeam || "TEAM";
            document.getElementById('disp-score').innerText = `${d.runs}-${d.wkts}`;
            document.getElementById('disp-ovs').innerText = `${Math.floor(d.balls/6)}.${d.balls%6}`;

            // Batsmen
            document.getElementById('p1-n').innerText = d.p1n || "P1";
            document.getElementById('p1-s').innerText = `${d.p1r}(${d.p1b})`;
            document.getElementById('p1-div').className = d.str === 1 ? 'p-unit active' : 'p-unit';

            document.getElementById('p2-n').innerText = d.p2n || "P2";
            document.getElementById('p2-s').innerText = `${d.p2r}(${d.p2b})`;
            document.getElementById('p2-div').className = d.str === 2 ? 'p-unit active' : 'p-unit';

            // Bowler
            document.getElementById('disp-bwn').innerText = d.bwn || "Bowler";
            document.getElementById('disp-bw-stats').innerText = `${d.bww}-${d.bwr} (${Math.floor(d.bwb/6)}.${d.bwb%6})`;

            // Target
            if(d.target > 0) {
                document.getElementById('target-ui').style.display = 'flex';
                document.getElementById('disp-target').innerText = d.target;
            } else {
                document.getElementById('target-ui').style.display = 'none';
            }
        });
    </script>
</body>
</html>
