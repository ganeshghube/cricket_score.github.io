<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricket Slim Overlay</title>
    <style>
        body { 
            margin: 0; padding: 0; background: transparent; 
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden; width: 1920px; height: 1080px;
        }

        .master-wrapper {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); width: 100%;
            display: flex; justify-content: center;
        }

        .ribbon {
            display: flex; flex-direction: row; align-items: center;
            background: rgba(0, 0, 0, 0.9); height: 55px;
            border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            min-width: 900px; overflow: hidden;
        }

        .main-score {
            background: #f1c40f; color: #000; height: 100%;
            padding: 0 20px; display: flex; align-items: center;
            font-weight: 900; font-size: 24px;
        }

        .ovs-label {
            font-size: 16px; margin-left: 10px;
            background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 3px;
        }

        .batsmen {
            flex-grow: 1; display: flex; justify-content: space-around;
            padding: 0 20px; color: #fff;
        }

        .p-unit { font-size: 18px; }
        .p-unit.active { color: #f1c40f; font-weight: bold; }
        .p-unit.active::after { content: '*'; margin-left: 3px; }
        .p-runs { font-size: 14px; color: #aaa; margin-left: 8px; }

        /* Fixed Bowler Section with contrast background */
        .bowler {
            background: #222; height: 100%;
            padding: 0 20px; display: flex; align-items: center;
            font-size: 16px; border-left: 2px solid #f1c40f;
        }

        .bwl-n { font-weight: bold; color: #f1c40f; margin-right: 10px; text-transform: uppercase; font-size: 14px; }
        .bwl-s { color: #fff; font-weight: bold; }

        .target-box {
            background: #fff; color: #000; padding: 0 15px;
            height: 100%; display: flex; align-items: center;
            font-weight: 900; font-size: 16px; border-left: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="master-wrapper">
        <div class="ribbon">
            <div class="main-score">
                <span id="disp-team">TEAM</span>
                <span style="margin-left:15px;" id="disp-score">0-0</span>
                <span class="ovs-label" id="disp-ovs">0.0</span>
            </div>
            <div class="batsmen">
                <div id="p1-div" class="p-unit"><span id="p1-n">P1</span><span class="p-runs" id="p1-s">0(0)</span></div>
                <div id="p2-div" class="p-unit"><span id="p2-n">P2</span><span class="p-runs" id="p2-s">0(0)</span></div>
            </div>
            <div class="bowler">
                <span class="bwl-n">BWL</span>
                <span id="disp-bwn" style="margin-right:10px; color:#eee;">Bowler</span>
                <span class="bwl-s" id="disp-bw-stats">0-0 (0.0)</span>
            </div>
            <div id="target-ui" class="target-box" style="display:none;">TGT: <span id="disp-target">0</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU",
            authDomain: "cricket-8e338.firebaseapp.com",
            projectId: "cricket-8e338",
            storageBucket: "cricket-8e338.firebasestorage.app",
            messagingSenderId: "41064243639",
            appId: "1:41064243639:web:d99e0d8f64b1bbca20c832"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const cricketRef = ref(db, 'cricket');

        onValue(cricketRef, (snapshot) => {
            const d = snapshot.val();
            if (!d) return;
            document.getElementById('disp-team').innerText = d.batTeam || "TEAM";
            document.getElementById('disp-score').innerText = `${d.runs}-${d.wkts}`;
            document.getElementById('disp-ovs').innerText = `${Math.floor(d.balls/6)}.${d.balls%6}`;
            document.getElementById('p1-n').innerText = d.p1n || "P1";
            document.getElementById('p1-s').innerText = `${d.p1r}(${d.p1b})`;
            document.getElementById('p1-div').className = d.str === 1 ? 'p-unit active' : 'p-unit';
            document.getElementById('p2-n').innerText = d.p2n || "P2";
            document.getElementById('p2-s').innerText = `${d.p2r}(${d.p2b})`;
            document.getElementById('p2-div').className = d.str === 2 ? 'p-unit active' : 'p-unit';
            document.getElementById('disp-bwn').innerText = d.bwn || "Bowler";
            document.getElementById('disp-bw-stats').innerText = `${d.bww}-${d.bwr} (${Math.floor(d.bwb/6)}.${d.bwb%6})`;
            if(d.target > 0) {
                document.getElementById('target-ui').style.display = 'flex';
                document.getElementById('disp-target').innerText = d.target;
            } else { document.getElementById('target-ui').style.display = 'none'; }
        });
    </script>
</body>
</html>
