<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scorecard Overlay</title>
    <style>
        :root {
            --accent: #f1c40f;
            --bg: rgba(6, 6, 6, 0.97);
            --card: rgba(20,20,20,0.98);
            --border: rgba(255,255,255,0.07);
            --green: #27ae60;
            --red: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: rgba(0,0,0,0); font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; color: white; overflow: hidden; height: 100vh; width: 100vw; }

        /* ── Wrapper ── */
        .scorecard-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 900px;
            background: var(--bg);
            border: 1px solid rgba(241,196,15,0.3);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .scorecard-wrapper.hidden {
            opacity: 0;
            transform: translate(-50%, -48%);
            pointer-events: none;
        }

        /* ── Header ── */
        .sc-header {
            background: linear-gradient(90deg, #1a1400, #111, #1a1400);
            border-bottom: 3px solid var(--accent);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sc-title { font-size: 16px; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .sc-meta { font-size: 12px; color: #666; }
        .sc-live { background: var(--green); color: white; padding: 2px 10px; border-radius: 3px; font-size: 11px; font-weight: 800; letter-spacing: 1px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

        /* ── Innings summary ── */
        .innings-summary {
            background: rgba(241,196,15,0.07);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .inn-block { display: flex; flex-direction: column; }
        .inn-team { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 1px; }
        .inn-score { font-size: 22px; font-weight: 900; color: white; line-height: 1; }
        .inn-score span { color: var(--accent); }
        .inn-detail { font-size: 12px; color: #888; margin-top: 2px; }
        .target-pill { background: var(--accent); color: black; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; }
        .need-pill { background: #c0392b; color: white; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }

        /* ── Tables ── */
        .tables-row { display: grid; grid-template-columns: 1fr 1fr; }
        @media (max-width: 650px) { .tables-row { grid-template-columns: 1fr; } }

        .table-section { padding: 12px 16px; border-right: 1px solid var(--border); }
        .table-section:last-child { border-right: none; }

        .section-header {
            font-size: 10px; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 8px; padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px;
            padding: 3px 6px; text-align: right; font-weight: 600;
        }
        th:first-child { text-align: left; }
        td {
            font-size: 13px; padding: 5px 6px; text-align: right;
            border-top: 1px solid rgba(255,255,255,0.03);
            color: #ddd;
        }
        td:first-child { text-align: left; font-size: 13px; color: white; font-weight: 600; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr.active-bat td:first-child { color: var(--accent); }
        tr.active-bat td:first-child::before { content: '▶ '; font-size: 8px; }
        tr.out-bat td { color: #666; }
        tr.out-bat td:first-child { text-decoration: line-through; color: #555; }
        tr.dnb td { color: #444; font-style: italic; }

        .sr-val { font-size: 11px; color: #888; }
        .economy-good { color: #27ae60; }
        .economy-bad { color: #e74c3c; }

        /* ── Footer ── */
        .sc-footer {
            background: rgba(0,0,0,0.5);
            border-top: 1px solid var(--border);
            padding: 6px 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: #555;
        }
        .sc-footer span { color: #888; }
        .kbd { background: #222; border: 1px solid #444; border-radius: 3px; padding: 1px 6px; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="scorecard-wrapper hidden" id="scorecardWrapper">
    <!-- Header -->
    <div class="sc-header">
        <div class="sc-title" id="sc-match-title">LIVE SCORECARD</div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div class="sc-meta" id="sc-format">T20</div>
            <div class="sc-live">LIVE</div>
        </div>
    </div>

    <!-- Innings summary -->
    <div class="innings-summary" id="inn-summary">
        <div class="inn-block">
            <div class="inn-team" id="inn-bat-team">BATTING</div>
            <div class="inn-score"><span id="inn-runs">0</span>/<span id="inn-wkts">0</span></div>
            <div class="inn-detail">Overs: <span id="inn-overs">0.0</span> · CRR: <span id="inn-crr">0.00</span></div>
        </div>
        <div id="target-block" style="display:none;">
            <div class="target-pill">Target <span id="sc-target">0</span></div>
            <div class="need-pill" style="margin-top:6px;" id="need-block">Need <span id="sc-need">0</span> off <span id="sc-needovers">0</span></div>
        </div>
        <div class="inn-block" id="inn1-ref" style="display:none;">
            <div class="inn-team" id="inn1-team">1st INN</div>
            <div class="inn-score" id="inn1-score" style="font-size:16px;"></div>
        </div>
    </div>

    <!-- Tables -->
    <div class="tables-row">
        <!-- Batting -->
        <div class="table-section">
            <div class="section-header">
                <span>🏏 Batting — <span id="bat-team-name">TEAM</span></span>
                <span id="bat-extras-label" style="color:#888;font-weight:400;"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Batsman</th>
                        <th>R</th>
                        <th>B</th>
                        <th>4s</th>
                        <th>6s</th>
                        <th>SR</th>
                    </tr>
                </thead>
                <tbody id="bat-tbody"></tbody>
            </table>
        </div>

        <!-- Bowling -->
        <div class="table-section">
            <div class="section-header">
                <span>⚾ Bowling — <span id="bowl-team-name">TEAM</span></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Bowler</th>
                        <th>O</th>
                        <th>R</th>
                        <th>W</th>
                        <th>Wd</th>
                        <th>Eco</th>
                    </tr>
                </thead>
                <tbody id="bowl-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <div class="sc-footer">
        <span>Press <span class="kbd">S</span> to toggle scorecard &nbsp;|&nbsp; <span class="kbd">B</span> to toggle score bar</span>
        <span id="sc-footer-inn"></span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCFSreoo7grP30O3P0dWyI5ADlwTNWGKgU", authDomain: "cricket-8e338.firebaseapp.com", projectId: "cricket-8e338", storageBucket: "cricket-8e338.firebasestorage.app", messagingSenderId: "41064243639", appId: "1:41064243639:web:d99e0d8f64b1bbca20c832" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const uiRef = ref(db, 'ui');

    // ── Keyboard shortcuts ──────────────────────────────
    let uiState = { scorebar: true, scorecard: false };
    onValue(uiRef, s => { uiState = s.val() || { scorebar: true, scorecard: false }; });

    document.addEventListener('keydown', e => {
        if (e.key === 's' || e.key === 'S') update(uiRef, { scorecard: !uiState.scorecard });
        if (e.key === 'b' || e.key === 'B') update(uiRef, { scorebar: !uiState.scorebar });
    });

    // ── Scorecard visibility ────────────────────────────
    onValue(uiRef, (snap) => {
        const ui = snap.val() || {};
        const wrapper = document.getElementById('scorecardWrapper');
        wrapper.className = ui.scorecard ? 'scorecard-wrapper' : 'scorecard-wrapper hidden';
    });

    // ── Main data ───────────────────────────────────────
    onValue(ref(db, 'cricket'), (snap) => {
        const d = snap.val(); if (!d) return;

        // Header
        document.getElementById('sc-match-title').textContent = `${d.batTeam} vs ${d.bowlTeam}`;
        document.getElementById('sc-format').textContent = d.maxOvers ? `T${d.maxOvers === 50 ? 'ODI/50' : d.maxOvers}` : 'T20';

        // Summary
        document.getElementById('inn-bat-team').textContent = d.batTeam;
        document.getElementById('inn-runs').textContent = d.runs;
        document.getElementById('inn-wkts').textContent = d.wkts;
        const ovsStr = `${Math.floor(d.balls/6)}.${d.balls%6}`;
        document.getElementById('inn-overs').textContent = ovsStr;
        const crr = d.balls > 0 ? (d.runs / (d.balls/6)).toFixed(2) : '0.00';
        document.getElementById('inn-crr').textContent = crr;

        // Target block
        if (d.target > 0) {
            document.getElementById('target-block').style.display = '';
            document.getElementById('sc-target').textContent = d.target;
            document.getElementById('sc-need').textContent = Math.max(0, d.target - d.runs);
            const ballsLeft = (d.maxOvers || 20) * 6 - d.balls;
            document.getElementById('sc-needovers').textContent = `${Math.floor(ballsLeft/6)}.${ballsLeft%6} overs`;
        } else {
            document.getElementById('target-block').style.display = 'none';
        }

        // 1st innings reference
        if (d.inn1Score) {
            document.getElementById('inn1-ref').style.display = '';
            document.getElementById('inn1-team').textContent = d.inn1Bat || '1st Inn';
            document.getElementById('inn1-score').textContent = d.inn1Score;
        } else {
            document.getElementById('inn1-ref').style.display = 'none';
        }

        // Team names
        document.getElementById('bat-team-name').textContent = d.batTeam;
        document.getElementById('bowl-team-name').textContent = d.bowlTeam;

        // Footer
        document.getElementById('sc-footer-inn').textContent = d.innings === 2 ? '2nd Innings' : '1st Innings';

        // ── Batting table ──────────────────────────────
        const batRows = d.batRows || [];
        const batTbody = document.getElementById('bat-tbody');
        batTbody.innerHTML = '';

        let extrasTotal = 0;
        // Add total wides + no balls to extras
        if (d.bowlRows) d.bowlRows.forEach(r => { extrasTotal += (r.wides||0) + (r.noballs||0); });
        document.getElementById('bat-extras-label').textContent = extrasTotal > 0 ? `Extras: ${extrasTotal}` : '';

        batRows.forEach(row => {
            const isOnStrike = (d.str === 1 && d.p1n === row.name) || (d.str === 2 && d.p2n === row.name);
            const isAtCrease = d.p1n === row.name || d.p2n === row.name;
            const sr = row.balls > 0 ? ((row.runs / row.balls) * 100).toFixed(0) : '—';
            let cls = '';
            if (row.out) cls = 'out-bat';
            else if (isOnStrike) cls = 'active-bat';

            const tr = document.createElement('tr');
            tr.className = cls;
            tr.innerHTML = `
                <td>${row.name}</td>
                <td><b>${row.runs}</b></td>
                <td>${row.balls}</td>
                <td>${row.fours || 0}</td>
                <td>${row.sixes || 0}</td>
                <td class="sr-val">${sr}</td>`;
            batTbody.appendChild(tr);
        });

        // DNB rows
        const shownNames = batRows.map(r => r.name);
        // (already all players are in batRows from init)

        // ── Bowling table ──────────────────────────────
        const bowlRows = d.bowlRows || [];
        const bowlTbody = document.getElementById('bowl-tbody');
        bowlTbody.innerHTML = '';

        bowlRows.forEach(row => {
            if (row.balls === 0 && row.wides === 0 && row.noballs === 0) {
                // Not bowled yet
                const tr = document.createElement('tr');
                tr.className = 'dnb';
                tr.innerHTML = `<td>${row.name}</td><td colspan="5" style="color:#333;text-align:center;font-size:11px;">yet to bowl</td>`;
                bowlTbody.appendChild(tr);
                return;
            }
            const oversStr = `${Math.floor(row.balls/6)}.${row.balls%6}`;
            const ovsDec = row.balls / 6;
            const eco = ovsDec > 0 ? (row.runs / ovsDec).toFixed(1) : '—';
            const ecoNum = parseFloat(eco);
            const ecoClass = ecoNum < 7 ? 'economy-good' : (ecoNum > 10 ? 'economy-bad' : '');

            const isCurrentBowler = d.bwn === row.name;
            const tr = document.createElement('tr');
            if (isCurrentBowler) tr.style.background = 'rgba(241,196,15,0.04)';
            tr.innerHTML = `
                <td>${row.name}${isCurrentBowler ? ' <span style="color:var(--accent);font-size:9px;">▶</span>' : ''}</td>
                <td>${oversStr}</td>
                <td>${row.runs}</td>
                <td><b>${row.wkts}</b></td>
                <td style="color:#888">${(row.wides||0)+(row.noballs||0)}</td>
                <td class="${ecoClass}">${eco}</td>`;
            bowlTbody.appendChild(tr);
        });
    });
</script>
</body>
</html>
